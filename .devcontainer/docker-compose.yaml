name: rose.karon.se

services:
  # Update this to the name of the service you want to work with in your docker-compose.yml file
  workspace:
    # Build the workspace image from the specified Dockerfile
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    # Automatically restart unless container is explicitly stopped
    restart: unless-stopped

    # Use SIGINT (Ctrl+C) for graceful shutdown (instead of default SIGTERM)
    stop_signal: SIGINT

    volumes:
      # Update this to wherever you want VS Code to mount the folder of your project
      - ..:/workspace:cached
      # Mount workspace data from Docker volume
      - workspace_data:/home/node

    # Start opencode webinterface
    command: ["opencode", "web", "--hostname", "0.0.0.0"]

    # Use local `.env` file for workspace environment
    env_file:
      - path: ../.env
        required: false

    ports:
      - "4096"

volumes:
  workspace_data:
